name: Build RDF Browser

# Split tags pick the app: rdf-era-v* → ERA RDF Browser, rdf-cordis-v* → CORDIS
# RDF Browser. Both build from ae-rdf; the app-specific config is merged in via
# --config for CORDIS (the base tauri.conf.json is ERA).
on:
  push:
    tags:
      - 'rdf-era-v*'
      - 'rdf-cordis-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Parse the tag → app product name + the extra tauri --config arg, and create ONE
  # draft release up front (parallel matrix jobs must share it, else artifacts
  # scatter across duplicate releases for the same tag).
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      config_arg: ${{ steps.app.outputs.config_arg }}
      product: ${{ steps.app.outputs.product }}
    steps:
      - name: Resolve app from tag
        id: app
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == rdf-cordis-* ]]; then
            echo "product=CORDIS RDF Browser" >> "$GITHUB_OUTPUT"
            echo "config_arg=--config src-tauri/tauri.cordis.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "product=ERA RDF Browser" >> "$GITHUB_OUTPUT"
            echo "config_arg=" >> "$GITHUB_OUTPUT"
          fi
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        env:
          PRODUCT: ${{ steps.app.outputs.product }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const product = process.env.PRODUCT
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `${product} ${tag}`,
              body: 'Download the installer for your platform below.',
              draft: true,
              prerelease: false,
            })
            return data.id

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri build runs beforeBuildCommand, which bakes the app's config
      # (apps/<app>/app.json + optional logo) into dist/config via bundle-app-config.mjs.
      # config_arg merges the CORDIS override onto the base (ERA) tauri.conf.json.
      - name: Build ${{ needs.create-release.outputs.product }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ae-rdf
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }} ${{ needs.create-release.outputs.config_arg }}
