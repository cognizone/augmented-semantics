name: Build ERA RDF Browser

on:
  push:
    tags:
      - 'rdf-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create ONE draft release up front and hand its id to the matrix build jobs.
  # Without this, parallel matrix jobs each create a release for the same tag and
  # the artifacts scatter across duplicates (happened on rdf-v0.1.0).
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ERA RDF Browser ${tag}`,
              body: 'Download the installer for your platform below.',
              draft: true,
              prerelease: false,
            })
            return data.id

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri build runs beforeBuildCommand: `npm run build && node scripts/bundle-era-config.mjs`,
      # which bakes apps/era-rdf/app.json (EVR default + ERA endpoints) and logo into dist/config.
      - name: Build ERA RDF Browser
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ae-rdf
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
